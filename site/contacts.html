<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакты - NOVA TRADE</title>
  <meta name="description" content="Контактная информация и форма обратной связи." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="contacts">
  <div data-header></div>
  <main class="container">
    <nav class="breadcrumbs">Главная / Контакты</nav>
    <section class="section grid-3">
      <article class="panel">
        <h1>Контакты</h1>
        <p>Москва, ул. Примерная, 10</p>
        <p>+7 (900) 000-00-00</p>
        <p>sales@nova-trade.example</p>
      </article>
      <article class="panel" style="grid-column: span 2;">
        <h2>Форма обратной связи</h2>
        <form class="form" data-lead-form>
          <div class="row">
            <input type="text" name="name" placeholder="Имя" required />
            <input type="tel" name="phone" placeholder="Телефон" required />
          </div>
          <input type="email" name="email" placeholder="Email" />
          <textarea name="comment" rows="4" placeholder="Комментарий"></textarea>
          <input type="text" name="company" class="hidden" tabindex="-1" autocomplete="off" />
          <button class="cta cta-primary" type="submit">Отправить сообщение</button>
          <div class="alert">Сообщение отправлено.</div>
        </form>
      </article>
    </section>
  </main>
  <div data-footer></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
